name: api_to_dart
description: "Convert any API (Postman, OpenAPI, Apidog, or YAML) into type-safe Dart actions and response models with an interactive terminal UI."
version: 0.5.0
repository: https://github.com/abdo-ahmed-it/api_to_dart
issue_tracker: https://github.com/abdo-ahmed-it/api_to_dart/issues

executables:
  api2dart: api_to_dart

environment:
  sdk: ^3.6.2

dependencies:
  args: ^2.7.0
  dart_console: ^4.1.4
  dart_style: ^3.0.1
  http: ^1.3.0
  yaml: ^3.1.0
  path: ^1.9.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
  mocktail: ^1.0.0
