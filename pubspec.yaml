name: api_request_generator
description: "Generate type-safe API request actions and response models from Postman, OpenAPI, Apidog, or YAML with an interactive terminal UI."
version: 0.1.0
repository: https://github.com/abdo-ahmed-it/api_request_generator
issue_tracker: https://github.com/abdo-ahmed-it/api_request_generator/issues

executables:
  apigen: api_request_generator

environment:
  sdk: ^3.6.2

dependencies:
  args: ^2.7.0
  dart_style: ^3.0.1
  http: ^1.3.0
  yaml: ^3.1.0
  path: ^1.9.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
  mocktail: ^1.0.0
